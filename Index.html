<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zyphost.de - Status</title>

<style>
:root {
    --bg:#0d1117;
    --card:#161b22;
    --border:#21262d;
    --text:#c9d1d9;
    --muted:#8b949e;
    --ok:#2ea043;
    --bad:#f85149;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{width:100%;max-width:650px;}

header{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:24px;
    text-align:center;
}

.status-dot{
    width:50px;height:50px;border-radius:50%;
    background:var(--muted);
    margin:0 auto 12px;
    transition:.3s;
}

.online .status-dot{background:var(--ok);box-shadow:0 0 18px rgba(46,160,67,.4);}
.offline .status-dot{background:var(--bad);box-shadow:0 0 18px rgba(248,81,73,.4);}

.status-title{font-size:1.5rem;font-weight:700;}
.online .status-title span{color:var(--ok);}
.offline .status-title span{color:var(--bad);}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    margin-top:16px;
}

.box{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.item:last-child{border-bottom:none;}

.muted{color:var(--muted);}
</style>
</head>

<body>

<div class="container">

<header>
    <h1>zyphost.de</h1>
    <span class="muted">Live Status</span>
</header>

<div class="card" id="card">
    <div class="status-dot"></div>
    <div class="status-title">Status: <span>lädt...</span></div>
    <div class="muted" id="status-text">Bitte warten...</div>
</div>

<div class="grid">

<div class="box">
    <h3 class="muted">Uptime</h3>
    <div class="item"><span>24h</span><span id="u24">--</span></div>
    <div class="item"><span>7 Tage</span><span id="u7">--</span></div>
    <div class="item"><span>30 Tage</span><span id="u30">--</span></div>
</div>

<div class="box">
    <h3 class="muted">Ping</h3>
    <div class="item"><span>Aktuell</span><span id="ping">--</span></div>
</div>

</div>

</div>

<script>
const API_KEY = "u3369778-9417a71056c15894c475b5ab"; // NICHT im Frontend lassen!

async function loadStatus() {
    try {
        const res = await fetch("https://api.uptimerobot.com/v2/getMonitors", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                api_key: API_KEY,
                custom_uptime_ratios: "1-7-30",
                response_times: 1
            })
        });

        const json = await res.json();

        if (json.stat !== "ok" || !json.monitors?.length) {
            setError("API Fehler");
            return;
        }

        const m = json.monitors[0];

        const card = document.getElementById("card");
        const statusSpan = card.querySelector("span");

        const online = m.status === 2;

        card.classList.toggle("online", online);
        card.classList.toggle("offline", !online);

        statusSpan.textContent = online ? "online" : "offline";
        document.getElementById("status-text").textContent =
            online ? "Alle Systeme stabil." : "Störung erkannt.";

        // Uptime sicher parsen
        const u = (m.custom_uptime_ratios || "0-0-0").split("-");

        document.getElementById("u24").textContent = (u[0] ?? 0) + "%";
        document.getElementById("u7").textContent = (u[1] ?? 0) + "%";
        document.getElementById("u30").textContent = (u[2] ?? 0) + "%";

        // Ping
        const ping = m.response_times?.[0]?.value;
        document.getElementById("ping").textContent =
            ping ? ping + " ms" : "--";

    } catch (e) {
        setError("Netzwerkfehler");
        console.error(e);
    }
}

function setError(msg){
    document.getElementById("status-text").textContent = msg;
}

loadStatus();
setInterval(loadStatus, 60000);
</script>

</body>
</html>
